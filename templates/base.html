<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Parecer de Marca · Azul{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul-blue: #003DA6;
      --azul-blue-dark: #00266b;
      --accent: {{ vertical.cor if vertical else '#003DA6' }};
      --accent-dark: color-mix(in srgb, var(--accent) 70%, black);
      --accent-soft: color-mix(in srgb, var(--accent) 12%, white);
      --bg-1: #eef3fb;
      --bg-2: #f7f4ee;
      --card: #ffffff;
      --text: #16213e;
      --muted: #64748b;
      --verde: #16a34a;
      --amarelo: #d97706;
      --vermelho: #dc2626;
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow-soft: 0 1px 2px rgba(16,24,64,0.04), 0 12px 32px -12px rgba(16,24,64,0.18);
      --shadow-lift: 0 20px 45px -18px rgba(16,24,64,0.35);
      --border: rgba(16,24,64,0.05);
      --input-bg: #fbfcfe;
      --field-border: #e2e8f0;
      --chip-bg: #f1f5f9;
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1: #0b1220;
        --bg-2: #10182b;
        --card: #131c30;
        --text: #e6ebf5;
        --muted: #94a3b8;
        --accent-soft: color-mix(in srgb, var(--accent) 22%, #131c30);
        --shadow-soft: 0 1px 2px rgba(0,0,0,0.3), 0 12px 32px -12px rgba(0,0,0,0.55);
        --border: rgba(255,255,255,0.08);
        --input-bg: #0f1830;
        --field-border: #263252;
        --chip-bg: #1a2438;
        color-scheme: dark;
      }
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 600px at 15% -10%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(0,61,166,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      background-attachment: fixed;
    }
    h1, h2, h3, .display {
      font-family: "Poppins", "Inter", sans-serif;
      letter-spacing: -0.01em;
    }
    a { color: var(--accent-dark); }

    header.topbar {
      background: linear-gradient(120deg, var(--accent), var(--accent-dark));
      color: #fff;
      padding: 1.1rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-soft);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header.topbar .brand {
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      letter-spacing: -0.01em;
    }
    header.topbar .brand .badge-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.1rem;
      height: 2.1rem;
      background: rgba(255,255,255,0.18);
      border-radius: 10px;
      font-size: 1.15rem;
    }
    header.topbar form { margin: 0; }
    /* Reutilizável em qualquer botão "Sair" sobre fundo colorido (topbar ou hero) */
    button.logout {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      padding: 0.5rem 1.15rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    button.logout:hover { background: rgba(255,255,255,0.26); transform: translateY(-1px); }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 1rem;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 1.9rem 2rem;
      box-shadow: var(--shadow-soft);
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      animation: rise 0.45s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.88rem; color: var(--text); }
    input[type=text], input[type=password], textarea {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1.5px solid var(--field-border);
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 1.15rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    input[type=text]:focus, input[type=password]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--card);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    textarea { min-height: 130px; resize: vertical; line-height: 1.5; }

    button.primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.6rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 10px 24px -10px color-mix(in srgb, var(--accent) 70%, black);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    button.primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
    button.primary:active { transform: translateY(0); }
    button.primary:disabled {
      opacity: 0.75;
      cursor: progress;
      transform: none;
    }
    button.primary .spinner {
      display: inline-block;
      width: 0.95em; height: 0.95em;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      vertical-align: -0.15em;
      margin-right: 0.45em;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 0.85rem 1.05rem;
      margin-bottom: 1.15rem;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .muted { color: var(--muted); font-size: 0.88rem; }
    footer.disclaimer {
      max-width: 760px;
      margin: 0.5rem auto 2.5rem;
      padding: 0 1.25rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
