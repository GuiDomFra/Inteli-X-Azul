<svg viewBox="0 0 400 110" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <!-- deriva (cauda vertical) -->
  <path d="M70,39 L110,39 L80,5 Z" fill="#0b2a5b"/>
  <!-- logo em mosaico colorido na cauda -->
  <rect x="83" y="9" width="6" height="6" fill="#4a90d9"/>
  <rect x="79" y="16" width="6" height="6" fill="#2ea84a"/>
  <rect x="87" y="16" width="6" height="6" fill="#00a19a"/>
  <rect x="79" y="24" width="6" height="6" fill="#f2b705"/>
  <rect x="87" y="24" width="6" height="6" fill="#4a90d9"/>

  <!-- asa principal -->
  <path d="M180,71 L155,100 L230,71 Z" fill="#1f3a63"/>
  <!-- motor sob a asa -->
  <ellipse cx="195" cy="82" rx="16" ry="7" fill="#334155"/>

  <!-- fuselagem + nariz num único contorno, bem alongada -->
  <path d="M20,55
           C20,44 35,38 60,37
           L280,37
           C310,38 340,42 385,55
           C340,68 310,72 280,73
           L60,73
           C35,72 20,66 20,55 Z"
        fill="#ffffff" stroke="#8ea0c2" stroke-width="2.5"/>

  <!-- barriga azul-marinho (bicolor, como a livrea real) -->
  <path d="M75,73 L275,73 L275,68 L75,55 Z" fill="#0b2a5b"/>

  <!-- trem de pouso (por cima da asa, pra ficar visível) -->
  <line x1="165" y1="73" x2="165" y2="91" stroke="#334155" stroke-width="3"/>
  <circle cx="165" cy="95" r="5" fill="#334155"/>
  <line x1="210" y1="73" x2="210" y2="91" stroke="#334155" stroke-width="3"/>
  <circle cx="210" cy="95" r="5" fill="#334155"/>
  <!-- trem de pouso do nariz -->
  <line x1="295" y1="71" x2="295" y2="83" stroke="#334155" stroke-width="2.5"/>
  <circle cx="295" cy="86" r="4" fill="#334155"/>

  <!-- friso verde, na linha de transição branco/azul -->
  <path d="M75,55 L275,68" stroke="#2ea84a" stroke-width="3" stroke-linecap="round"/>

  <!-- janela da cabine -->
  <ellipse cx="335" cy="53" rx="7" ry="5" fill="#0b2a5b"/>

  <!-- janelas dos passageiros (dos dois lados da logomarca, sem sobrepor) -->
  <circle cx="85" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="100" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="115" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="130" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="145" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="252" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="264" cy="48" r="2.8" fill="#0b2a5b"/>
  <circle cx="276" cy="48" r="2.8" fill="#0b2a5b"/>

  <!-- logomarca — pré-espelhada quando o SVG inteiro for invertido via CSS
       (avião de pouso), pra o texto continuar legível nos dois casos -->
  {% if mirror_text %}
  <g transform="translate(400,0) scale(-1,1)">
    <text x="205" y="58" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700" font-style="italic" font-size="22" fill="#0b2a5b">azul</text>
  </g>
  {% else %}
  <text x="205" y="58" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700" font-style="italic" font-size="22" fill="#0b2a5b">azul</text>
  {% endif %}
</svg>
